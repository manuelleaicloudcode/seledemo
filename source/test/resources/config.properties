# -----------------------------------------------------------------
# Selenium Grid Configuration
# -----------------------------------------------------------------
# Set this to 'true' to run tests on the grid, 'false' for local
grid.enabled=true

# URL of the Selenium Grid Hub
grid.url=http://localhost:4444

# Default browser for tests
browser=chrome

# -----------------------------------------------------------------
# Local WebDriver Configuration (for when grid.enabled=false)
# -----------------------------------------------------------------
# Path to your local webdriver executables if not using a manager
# chrome.driver.path=/path/to/chromedriver