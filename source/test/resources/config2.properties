# -------------------------------------------------
# BROWSER CONFIGURATION
# -------------------------------------------------
browser=chrome

# -------------------------------------------------
# SELENIUM GRID CONFIGURATION
# -------------------------------------------------
grid.enabled=true
grid.url=http://localhost:4444

# -------------------------------------------------
# PROXY CONFIGURATION
# -------------------------------------------------
# Set to 'true' to use a proxy for browser traffic
proxy.enabled=true

# Your proxy server details
proxy.host=your.proxy.company.com
proxy.port=8080

# Optional: If your proxy requires authentication
# WARNING: Storing credentials here is not secure for production.
# Use environment variables or a secrets manager for real projects.
proxy.username=your_username
proxy.password=your_password